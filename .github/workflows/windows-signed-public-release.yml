name: Windows Signed Public Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows-signed-public-release:
    name: Build Windows signed public release
    runs-on: windows-latest
    env:
      CARGO_INCREMENTAL: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Prepare code signing certificate
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $encoded = '${{ secrets.KELI_SIGN_CERT_PFX_BASE64 }}'
          if ([string]::IsNullOrWhiteSpace($encoded)) {
            throw 'KELI_SIGN_CERT_PFX_BASE64 repository secret is required'
          }
          if ([string]::IsNullOrWhiteSpace('${{ secrets.KELI_SIGN_CERT_PASSWORD }}')) {
            throw 'KELI_SIGN_CERT_PASSWORD repository secret is required'
          }
          $certPath = Join-Path $env:RUNNER_TEMP 'keli-codesign.pfx'
          [System.IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($encoded))
          "KELI_SIGN_CERT_PATH=$certPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "KELI_SIGN_CERT_PASSWORD=${{ secrets.KELI_SIGN_CERT_PASSWORD }}" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          $timestampUrl = '${{ vars.KELI_SIGN_TIMESTAMP_URL }}'
          if (![string]::IsNullOrWhiteSpace($timestampUrl)) {
            "KELI_SIGN_TIMESTAMP_URL=$timestampUrl" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          }

      - name: Run signed public release gate
        shell: pwsh
        run: .\scripts\desktop-signed-release.ps1

      - name: Generate SHA256SUMS
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $payload = @(
            'target\desktop\keli-desktop-mvp-windows-x64.zip',
            'target\desktop\keli-desktop-mvp-windows-x64.msi',
            'target\desktop\keli-desktop-release-evidence.json',
            'target\desktop\keli-desktop-signing.json',
            'target\desktop\keli-desktop-signed-release.json'
          )
          $lines = foreach ($path in $payload) {
            if (!(Test-Path -LiteralPath $path -PathType Leaf)) {
              throw "required signed release payload is missing: $path"
            }
            $hash = Get-FileHash -LiteralPath $path -Algorithm SHA256
            "$($hash.Hash.ToLowerInvariant())  $(Split-Path -Leaf $path)"
          }
          $lines | Set-Content -LiteralPath 'target\desktop\SHA256SUMS' -Encoding ASCII

      - name: Upload signed public release payload
        uses: actions/upload-artifact@v4
        with:
          name: keli-windows-signed-public-${{ github.ref_name }}
          if-no-files-found: error
          path: |
            target/desktop/keli-desktop-mvp-windows-x64.zip
            target/desktop/keli-desktop-mvp-windows-x64.msi
            target/desktop/keli-desktop-release-evidence.json
            target/desktop/keli-desktop-signing.json
            target/desktop/keli-desktop-signed-release.json
            target/desktop/SHA256SUMS

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          prerelease: false
          body: Signed Windows public release. See attached release and signing evidence before distribution.
          files: |
            target/desktop/keli-desktop-mvp-windows-x64.zip
            target/desktop/keli-desktop-mvp-windows-x64.msi
            target/desktop/keli-desktop-release-evidence.json
            target/desktop/keli-desktop-signing.json
            target/desktop/keli-desktop-signed-release.json
            target/desktop/SHA256SUMS

      - name: Cleanup code signing certificate
        if: always()
        shell: pwsh
        run: |
          if (![string]::IsNullOrWhiteSpace($env:KELI_SIGN_CERT_PATH) -and (Test-Path -LiteralPath $env:KELI_SIGN_CERT_PATH -PathType Leaf)) {
            Remove-Item -LiteralPath $env:KELI_SIGN_CERT_PATH -Force
          }
